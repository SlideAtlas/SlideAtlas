{% extends "base.html" %}
{% block title %}사용자 매뉴얼 — SlideAtlas{% endblock %}

{% block extra_head %}
<style>
.manual-page {
  max-width: 760px;
  margin: 0 auto;
  padding: 56px 24px 80px;
}

.manual-page-title {
  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  font-size: 28px;
  color: #0F1F3D;
  letter-spacing: -0.02em;
  margin-bottom: 8px;
}

.manual-page-sub {
  font-size: 14px;
  color: #9B9490;
  font-family: 'Noto Sans KR', sans-serif;
  margin-bottom: 40px;
}

.manual-notice {
  background: #F0EDE9;
  border-left: 3px solid #5BB8D4;
  border-radius: 0 8px 8px 0;
  padding: 14px 18px;
  font-size: 14px;
  color: #4A5568;
  font-family: 'Noto Sans KR', sans-serif;
  line-height: 1.7;
  margin-bottom: 32px;
}

.manual-list {
  border-top: 2px solid #0F1F3D;
}

.manual-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 20px 4px;
  border-bottom: 1px solid #F0EDE9;
}

.manual-item-info {
  display: flex;
  align-items: center;
  gap: 14px;
  flex: 1;
  min-width: 0;
}

.manual-icon {
  width: 40px;
  height: 40px;
  background: #F0EDE9;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.manual-item-title {
  font-size: 15px;
  font-weight: 600;
  color: #0F1F3D;
  font-family: 'Noto Sans KR', sans-serif;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.manual-item-meta {
  font-size: 12px;
  color: #9B9490;
  font-family: 'Noto Sans KR', sans-serif;
  margin-top: 2px;
}

.manual-download-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  background: #0F1F3D;
  color: #fff;
  text-decoration: none;
  border-radius: 7px;
  font-size: 13px;
  font-weight: 700;
  font-family: 'Noto Sans KR', sans-serif;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background 0.2s;
}

.manual-download-btn:hover {
  background: #5BB8D4;
}

.manual-support-link {
  margin-top: 48px;
  text-align: center;
}

.manual-support-link p {
  font-size: 14px;
  color: #9B9490;
  font-family: 'Noto Sans KR', sans-serif;
  margin-bottom: 12px;
}

.manual-support-btn {
  display: inline-block;
  padding: 11px 24px;
  border: 1.5px solid #0F1F3D;
  color: #0F1F3D;
  text-decoration: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  font-family: 'Noto Sans KR', sans-serif;
  transition: background 0.2s, color 0.2s;
}

.manual-support-btn:hover {
  background: #0F1F3D;
  color: #fff;
}
</style>
{% endblock %}

{% block content %}
<div class="manual-page">
  <h1 class="manual-page-title">사용자 매뉴얼</h1>
  <p class="manual-page-sub">SlideAtlas 이용 가이드를 다운로드하세요.</p>

  <div class="manual-notice">
    매뉴얼을 준비 중입니다. 문의사항은 1:1 문의를 이용해 주세요.
  </div>

  <div class="manual-list">
    <div class="manual-item">
      <div class="manual-item-info">
        <div class="manual-icon">📄</div>
        <div>
          <div class="manual-item-title">SlideAtlas 사용자 매뉴얼 v1.0</div>
          <div class="manual-item-meta">준비 중</div>
        </div>
      </div>
      <a href="#" class="manual-download-btn"
         onclick="event.preventDefault(); showToast('매뉴얼을 준비 중입니다.');">
        PDF 보기
      </a>
    </div>
  </div>

  <div class="manual-support-link">
    <p>더 궁금한 점이 있으신가요?</p>
    <a href="/support" class="manual-support-btn">1:1 문의하기</a>
  </div>
</div>
{% endblock %}
