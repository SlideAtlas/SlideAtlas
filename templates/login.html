{% extends "base.html" %}
{% block title %}로그인 — SlideAtlas{% endblock %}

{% block extra_head %}
<style>
/* 로그인 페이지: 베이지 단색 배경, 터미널 중앙 배치 */
.login-page-bg {
    background: #FAF8F5;
    min-height: calc(100vh - 64px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
}
</style>
{% endblock %}

{% block content %}
<!-- 이미 로그인 상태면 / 로 리다이렉트 (서버사이드에서도 처리되지만 클라이언트 방어 추가) -->
{% if is_logged %}
<script>location.href = '/';</script>
{% endif %}

<div class="login-page-bg">
  <!-- next 파라미터 보존: login_terminal.js가 URLSearchParams로 직접 읽음 -->
  <input type="hidden" id="next-url-hint" value="{{ next | e }}">
  <div id="login-terminal-root"></div>
</div>
{% endblock %}

{% block extra_js %}
<script src="/static/js/login_terminal.js"></script>
{% endblock %}
